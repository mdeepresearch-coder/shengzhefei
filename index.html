<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>省着飞 ✈ 低价机票发现</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --primary: #1a56db;
      --price: #e53e3e;
      --text: #1a202c;
      --muted: #718096;
      --border: #e2e8f0;
      --tag-bg: #ebf4ff;
      --tag-color: #2b6cb0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a56db 0%, #0d3b9e 100%);
      color: white;
      padding: 20px 16px 28px;
      text-align: center;
      position: relative;
    }
    header h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    header h1 span { opacity: 0.85; font-size: 20px; }
    header p {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.75;
    }
    .header-wave {
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 20px;
      background: var(--bg);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 16px 16px 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* ── Stats bar ── */
    .stats-bar {
      padding: 0 16px 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .stats-bar strong { color: var(--text); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 0 16px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .card:active { transform: translateY(0); }

    .card-img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      object-position: top;
      background: #e2e8f0;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 16/10;
      background: linear-gradient(135deg, #e6f0ff, #c3d9ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .card-body {
      padding: 14px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .route-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .city {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .city-code {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }
    .plane-icon {
      font-size: 16px;
      opacity: 0.6;
      flex: 1;
      text-align: center;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .price {
      font-size: 28px;
      font-weight: 800;
      color: var(--price);
      letter-spacing: -1px;
    }
    .price-unit {
      font-size: 14px;
      color: var(--price);
      font-weight: 600;
    }
    .price-label {
      font-size: 12px;
      color: var(--muted);
    }

    .meta-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--tag-bg);
      color: var(--tag-color);
      font-weight: 500;
    }
    .tag.date { background: #f0fff4; color: #276749; }
    .tag.airline { background: #fff8f0; color: #9c4221; }

    .note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .upload-time {
      font-size: 11px;
      color: #a0aec0;
    }
    .book-btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty div { font-size: 48px; margin-bottom: 12px; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; padding: 0 12px 80px; }
      header h1 { font-size: 22px; }
      .city { font-size: 18px; }
      .price { font-size: 24px; }
    }
  </style>
</head>
<body>

<header>
  <h1>省着飞 <span>✈</span></h1>
  <p>人工精选低价机票 · 每日更新 · 点击直达携程预订</p>
  <div class="header-wave"></div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">全部</button>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="grid" id="grid">
  <div class="loading">加载中…</div>
</div>

<footer>省着飞 · 低价来自人工甄选，仅供参考，以携程实时价格为准</footer>

<script>
  let allFlights = [];
  let currentFilter = 'all';

  async function loadFlights() {
    // file:// 协议下 fetch 会被浏览器安全策略拦截，需通过 HTTP 服务访问
    if (location.protocol === 'file:') {
      document.getElementById('grid').innerHTML =
        `<div class="empty">
          <div>🖥️</div>
          <p style="font-size:15px;font-weight:600;margin-bottom:8px">请通过网址访问</p>
          <p style="font-size:13px;line-height:1.8;max-width:320px;margin:0 auto">
            直接双击打开 HTML 文件会导致数据无法加载。<br>
            请将项目部署到 <strong>GitHub Pages / Netlify</strong> 后通过网址访问，<br>
            或在本地使用 <code style="background:#eee;padding:2px 6px;border-radius:4px">npx serve .</code> 启动服务。
          </p>
        </div>`;
      return;
    }
    try {
      const res = await fetch('./flights.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      allFlights = await res.json();
      // Sort by uploadTime descending
      allFlights.sort((a, b) => new Date(b.uploadTime) - new Date(a.uploadTime));
      buildFilters();
      renderFlights(allFlights);
    } catch (e) {
      document.getElementById('grid').innerHTML =
        `<div class="empty"><div>😕</div><p>数据加载失败（${e.message}），请刷新重试</p></div>`;
    }
  }

  function buildFilters() {
    const bar = document.getElementById('filterBar');
    const destinations = [...new Set(allFlights.map(f => f.to))];
    destinations.forEach(dest => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = dest;
      btn.textContent = dest;
      btn.onclick = () => setFilter(dest);
      bar.appendChild(btn);
    });
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });
    const filtered = filter === 'all' ? allFlights : allFlights.filter(f => f.to === filter);
    renderFlights(filtered);
  }

  document.querySelector('[data-filter="all"]').onclick = () => setFilter('all');

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return `${d.getMonth() + 1}月${d.getDate()}日`;
  }

  function formatUploadTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diffMs = now - d;
    const diffH = Math.floor(diffMs / 3600000);
    const diffD = Math.floor(diffMs / 86400000);
    if (diffH < 1) return '刚刚更新';
    if (diffH < 24) return `${diffH}小时前更新`;
    if (diffD < 7) return `${diffD}天前更新`;
    return `${d.getMonth()+1}/${d.getDate()} 更新`;
  }

  function renderFlights(flights) {
    const grid = document.getElementById('grid');
    const stats = document.getElementById('statsBar');

    stats.innerHTML = `共 <strong>${flights.length}</strong> 条低价线路`;

    if (flights.length === 0) {
      grid.innerHTML = '<div class="empty"><div>🔍</div><p>暂无该目的地的低价机票</p></div>';
      return;
    }

    grid.innerHTML = flights.map(f => {
      const imgHtml = f.image
        ? `<img class="card-img" src="${escHtml(f.image)}" alt="${escHtml(f.from)}到${escHtml(f.to)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-img-placeholder" style="display:none">✈️</div>`
        : `<div class="card-img-placeholder">✈️</div>`;

      const dateTag = (f.departDate && f.returnDate)
        ? `<span class="tag date">去 ${formatDate(f.departDate)} · 返 ${formatDate(f.returnDate)}</span>`
        : '';

      return `
      <a class="card" href="${escHtml(f.ctripUrl || '#')}" target="_blank" rel="noopener">
        ${imgHtml}
        <div class="card-body">
          <div class="route-row">
            <div>
              <div class="city">${escHtml(f.from)}</div>
              <div class="city-code">${escHtml(f.fromCode || '')}</div>
            </div>
            <div class="plane-icon">✈</div>
            <div style="text-align:right">
              <div class="city">${escHtml(f.to)}</div>
              <div class="city-code">${escHtml(f.toCode || '')}</div>
            </div>
          </div>

          <div class="price-row">
            <span class="price-unit">¥</span>
            <span class="price">${f.price}</span>
            <span class="price-label">${escHtml(f.tripType || '往返')} · 含税/人</span>
          </div>

          <div class="meta-row">
            ${f.airline ? `<span class="tag airline">${escHtml(f.airline)}</span>` : ''}
            ${dateTag}
          </div>

          ${f.note ? `<div class="note">${escHtml(f.note)}</div>` : ''}

          <div class="card-footer">
            <span class="upload-time">${formatUploadTime(f.uploadTime)}</span>
            <span class="book-btn">携程预订 →</span>
          </div>
        </div>
      </a>`;
    }).join('');
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  loadFlights();
</script>
</body>
</html>
