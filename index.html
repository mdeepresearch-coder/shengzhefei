<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>省着飞 ✈ 低价机票发现</title>
  <style>
    :root {
      --bg:      #f0f4f8;
      --card:    #ffffff;
      --primary: #1a56db;
      --price:   #e53e3e;
      --text:    #1a202c;
      --muted:   #718096;
      --border:  #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a56db 0%, #0d3b9e 100%);
      color: white;
      padding: 22px 16px 30px;
      text-align: center;
      position: relative;
    }
    header h1 { font-size: 26px; font-weight: 800; }
    header p  { font-size: 13px; opacity: .75; margin-top: 5px; }
    .wave {
      position: absolute; bottom: -1px; left: 0; right: 0; height: 20px;
      background: var(--bg);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    /* ── Filter ── */
    .filter-bar {
      display: flex; gap: 8px;
      padding: 16px 16px 8px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0; padding: 6px 14px;
      border-radius: 999px; border: 1.5px solid var(--border);
      background: white; font-size: 13px; color: var(--muted);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

    /* ── Stats ── */
    .stats { padding: 0 16px 12px; font-size: 12px; color: var(--muted); }
    .stats strong { color: var(--text); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 0 16px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,.13); }
    .card:active { transform: translateY(0); }

    /* Screenshot image — full image, no crop */
    .card-img-wrap {
      width: 100%;
      background: linear-gradient(160deg, #dbeafe, #bfdbfe);
      position: relative;
      overflow: hidden;
    }
    .card-img {
      width: 100%;
      display: block;
      cursor: zoom-in;
    }
    .zoom-hint {
      position: absolute;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,.45);
      color: white;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 99px;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    /* Lightbox */
    #lb {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.88);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lb.on { display: flex; }
    #lb img {
      max-width: min(92vw, 520px);
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    #lb-close {
      position: absolute; top: 16px; right: 18px;
      color: white; font-size: 28px; cursor: pointer;
      line-height: 1; opacity: .75;
    }
    #lb-close:hover { opacity: 1; }
    .card-img-ph {
      width: 100%; height: 200px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
    }

    /* Info bar */
    .card-info {
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
    }

    .route-line {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .city-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .plane {
      flex: 1;
      text-align: center;
      font-size: 18px;
      opacity: .5;
    }

    .price-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 10px;
    }
    .trip-type {
      font-size: 12px;
      color: var(--muted);
      background: #f7faff;
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 4px;
    }
    .price-num {
      font-size: 30px;
      font-weight: 900;
      color: var(--price);
      letter-spacing: -1px;
    }
    .price-symbol { font-size: 16px; font-weight: 700; color: var(--price); }
    .price-note { font-size: 12px; color: var(--muted); }

    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .update-time { font-size: 11px; color: #a0aec0; }
    .book-btn {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }

    /* ── States ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 48px; margin-bottom: 14px; }
    .empty p { font-size: 14px; line-height: 1.8; }
    .empty code {
      background: #edf2f7; border-radius: 4px;
      padding: 1px 6px; font-size: 13px;
    }
    .loading { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid var(--border);
      padding: 9px 16px; text-align: center;
      font-size: 11px; color: var(--muted);
    }

    /* ── New banner ── */
    #newBanner {
      display: none;
      background: linear-gradient(90deg, #38a169, #2f855a);
      color: white;
      text-align: center;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      position: sticky; top: 0; z-index: 100;
    }
    #newBanner span { margin-left: 6px; text-decoration: underline; font-size: 12px; opacity: .85; }

    /* ── New badge on card ── */
    .card-img-wrap { position: relative; }
    .new-badge {
      position: absolute; top: 10px; left: 10px;
      background: #e53e3e; color: white;
      font-size: 11px; font-weight: 800;
      padding: 2px 8px; border-radius: 99px;
      letter-spacing: .5px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      z-index: 2;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; padding: 0 12px 80px; }
      .city-name { font-size: 20px; }
      .price-num  { font-size: 26px; }
    }
  </style>
</head>
<body>

<!-- New flight banner -->
<div id="newBanner" onclick="dismissBanner()">
  🆕 <strong id="newCount"></strong> 条新低价机票！<span>点击关闭</span>
</div>

<!-- Lightbox -->
<div id="lb" onclick="closeLb()">
  <span id="lb-close" onclick="closeLb()">✕</span>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<header>
  <h1>省着飞 ✈</h1>
  <p>人工精选低价机票 · 每日更新 · 点击直达预订</p>
  <div class="wave"></div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
</div>

<div class="stats" id="stats"></div>

<div class="grid" id="grid">
  <div class="loading">加载中…</div>
</div>

<footer>省着飞 · 价格来自人工甄选，以各平台实时价格为准</footer>

<script>
  let all = [];
  let cur = 'all';

  const LAST_VISIT_KEY = 'szf_last_visit';

  async function load() {
    if (location.protocol === 'file:') {
      grid().innerHTML = `<div class="empty">
        <div class="icon">🖥️</div>
        <p>请通过网址访问，不能直接双击打开<br>
        本地预览可在终端运行 <code>npx serve .</code></p>
      </div>`;
      return;
    }
    try {
      const r = await fetch('./flights.json?t=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      all = await r.json();
      all.sort((a, b) => new Date(b.uploadTime) - new Date(a.uploadTime));
      checkNew();
      buildFilters();
      render(all);
      // 记录本次访问时间（延迟1s，确保先展示完内容）
      setTimeout(() => localStorage.setItem(LAST_VISIT_KEY, new Date().toISOString()), 1000);
    } catch (e) {
      grid().innerHTML = `<div class="empty"><div class="icon">😕</div><p>数据加载失败（${e.message}），请刷新重试</p></div>`;
    }
  }

  function checkNew() {
    const last = localStorage.getItem(LAST_VISIT_KEY);
    if (!last) return; // 第一次访问不提示
    const lastDate = new Date(last);
    const newItems = all.filter(f => new Date(f.uploadTime) > lastDate);
    if (!newItems.length) return;
    document.getElementById('newCount').textContent = newItems.length;
    document.getElementById('newBanner').style.display = 'block';
    // 记录哪些是新的，render时加角标
    window._newIds = new Set(newItems.map(f => f.id));
  }

  function dismissBanner() {
    document.getElementById('newBanner').style.display = 'none';
  }

  function buildFilters() {
    const bar = document.getElementById('filterBar');
    [...new Set(all.map(f => f.to))].forEach(dest => {
      const b = document.createElement('button');
      b.className = 'filter-btn';
      b.dataset.filter = dest;
      b.textContent = dest;
      b.onclick = () => setFilter(dest);
      bar.appendChild(b);
    });
  }

  function setFilter(f) {
    cur = f;
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.filter === f));
    render(f === 'all' ? all : all.filter(x => x.to === f));
  }

  function render(list) {
    document.getElementById('stats').innerHTML = `共 <strong>${list.length}</strong> 条低价线路`;
    if (!list.length) {
      grid().innerHTML = '<div class="empty"><div class="icon">🔍</div><p>暂无该目的地的低价机票</p></div>';
      return;
    }
    grid().innerHTML = list.map(f => {
      const imgHtml = f.image
        ? `<img class="card-img" src="${e(f.image)}" alt="${e(f.from)}到${e(f.to)}" loading="lazy"
             onclick="event.preventDefault();event.stopPropagation();openLb(this.src)"
             onerror="this.parentElement.innerHTML='<div class=card-img-ph>✈️</div>'">`
        : `<div class="card-img-ph">✈️</div>`;
      const isNew = window._newIds?.has(f.id);
      const imgWrap = f.image
        ? `<div class="card-img-wrap">${isNew ? '<span class="new-badge">NEW</span>' : ''}${imgHtml}<span class="zoom-hint">🔍 点击放大</span></div>`
        : `<div class="card-img-wrap">${isNew ? '<span class="new-badge">NEW</span>' : ''}${imgHtml}</div>`;

      return `<a class="card" href="${e(f.ctripUrl || '#')}" target="_blank" rel="noopener">
        ${imgWrap}
        <div class="card-info">
          <div class="route-line">
            <span class="city-name">${e(f.from)}</span>
            <span class="plane">✈</span>
            <span class="city-name">${e(f.to)}</span>
          </div>
          <div class="price-line">
            <span class="trip-type">${e(f.tripType || '往返')}</span>
            <span class="price-symbol">¥</span>
            <span class="price-num">${f.price}</span>
            <span class="price-note">含税/人</span>
          </div>
          <div class="card-foot">
            <span class="update-time">${relTime(f.uploadTime)}</span>
            <span class="book-btn">立即预订 →</span>
          </div>
        </div>
      </a>`;
    }).join('');
  }

  function relTime(ts) {
    const d = Math.floor((Date.now() - new Date(ts)) / 3600000);
    if (d < 1)  return '刚刚更新';
    if (d < 24) return `${d}小时前更新`;
    const days = Math.floor(d / 24);
    return days < 7 ? `${days}天前更新` : new Date(ts).toLocaleDateString('zh-CN', { month:'numeric', day:'numeric' }) + ' 更新';
  }

  function grid() { return document.getElementById('grid'); }
  function e(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openLb(src) {
    document.getElementById('lb-img').src = src;
    document.getElementById('lb').classList.add('on');
    document.body.style.overflow = 'hidden';
  }
  function closeLb() {
    document.getElementById('lb').classList.remove('on');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeLb(); });

  // 统计：点击预订按钮
  document.addEventListener('click', ev => {
    const card = ev.target.closest('a.card');
    if (!card) return;
    const from = card.querySelector('.city-name')?.textContent || '';
    const price = card.querySelector('.price-num')?.textContent || '';
    // Cloudflare Web Analytics 自定义事件（如已接入CF Analytics会自动上报）
    if (window.cfBeacon) {
      window.cfBeacon.push({ name: 'book_click', data: { route: from, price } });
    }
  });

  load();
</script>
</body>
</html>
