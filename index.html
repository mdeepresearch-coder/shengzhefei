<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>省着飞 · 人工精选低价机票</title>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "038f7aa0-03bc-4003-904e-a936b91b23df",
        notifyButton: { enable: false },
        welcomeNotification: {
          title: "省着飞 ✈",
          message: "订阅成功！有低价机票时我们会第一时间通知你 🎉"
        }
      });
      window._OS = OneSignal;
      try {
        const alreadyHandled = localStorage.getItem('szf_push_v1');
        const granted = await OneSignal.Notifications.permission;
        if (!alreadyHandled && !granted) {
          setTimeout(() => document.getElementById('pushModal')?.classList.add('on'), 4000);
        }
      } catch(e) { console.warn('OneSignal check:', e); }
    });
    async function acceptPush() {
      document.getElementById('pushModal').classList.remove('on');
      localStorage.setItem('szf_push_v1', '1');
      try { await window._OS?.Notifications.requestPermission(); } catch(e) { console.warn(e); }
    }
    function dismissPush() {
      document.getElementById('pushModal').classList.remove('on');
      localStorage.setItem('szf_push_v1', '1');
    }
  </script>
  <style>
    :root {
      --bg:       #F7F3EE;
      --card:     #FFFFFF;
      --hdr:      #1C1714;
      --accent:   #C96A2E;
      --price:    #C0392B;
      --text:     #1C1714;
      --muted:    #7A6B61;
      --border:   #EBE4DC;
      --tag-bg:   #FEF0E4;
      --tag-text: #8B4A1A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      background: var(--hdr);
      color: #FAF7F4;
      padding: clamp(24px, 5vw, 40px) 20px clamp(28px, 5vw, 44px);
      text-align: center;
      position: relative;
    }
    .hdr-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .hdr-eyebrow::before,
    .hdr-eyebrow::after {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
      opacity: .6;
    }
    header h1 {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
    }
    header h1 span { color: var(--accent); }
    header p {
      font-size: 13px;
      color: rgba(250,247,244,.5);
      letter-spacing: .02em;
    }
    /* Scallop edge */
    .hdr-edge {
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 18px;
      background: var(--bg);
      clip-path: ellipse(52% 100% at 50% 100%);
    }

    /* ── Filter section ────────────────────────────────────── */
    .filter-section {
      padding: 20px 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--muted);
      white-space: nowrap;
      width: 30px;
      flex-shrink: 0;
    }
    .filter-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }
    .filter-pills::-webkit-scrollbar { display: none; }
    .fpill {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      font-family: inherit;
      font-weight: 500;
    }
    .fpill:hover { border-color: var(--accent); color: var(--accent); }
    .fpill.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* ── Stats ─────────────────────────────────────────────── */
    .stats {
      padding: 14px 16px 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .stats strong { color: var(--text); font-weight: 700; }

    /* ── Grid ──────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 12px 16px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Card ──────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(28,23,20,.06), 0 4px 16px rgba(28,23,20,.06);
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 2px 8px rgba(28,23,20,.08), 0 12px 32px rgba(28,23,20,.1);
    }
    .card:active { transform: translateY(0); }

    /* Image area */
    .card-img-wrap {
      position: relative;
      width: 100%;
      background: #F0EBE4;
      overflow: hidden;
      cursor: zoom-in;
    }
    .card-img {
      width: 100%;
      display: block;
      transition: opacity .3s;
    }
    .card-img.loading { opacity: 0; }
    .card-img-ph {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      background: #F0EBE4;
      color: var(--muted);
    }

    /* NEW badge */
    .new-badge {
      position: absolute;
      top: 10px; left: 10px;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 999px;
      letter-spacing: .08em;
      box-shadow: 0 2px 8px rgba(201,106,46,.4);
      z-index: 2;
    }

    /* Info area */
    .card-info {
      padding: 14px 16px 15px;
      border-top: 1px solid var(--border);
      background: #FDFCFA;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Route */
    .route-row {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 9px;
    }
    .city {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      flex: 1;
    }
    .city.dest { text-align: right; }
    .route-arrow {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 8px;
      gap: 2px;
    }
    .route-arrow svg {
      width: 32px;
      height: 14px;
      opacity: .35;
    }

    /* Dates */
    .dates-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 11px;
      padding: 7px 10px;
      background: var(--tag-bg);
      border-radius: 8px;
    }
    .date-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      gap: 1px;
    }
    .date-label {
      font-size: 10px;
      color: var(--tag-text);
      opacity: .7;
      font-weight: 600;
      letter-spacing: .04em;
    }
    .date-val {
      font-size: 15px;
      font-weight: 700;
      color: var(--tag-text);
      letter-spacing: .01em;
      font-variant-numeric: tabular-nums;
    }
    .date-sep {
      font-size: 12px;
      color: var(--accent);
      opacity: .6;
      flex-shrink: 0;
    }

    /* Price */
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 7px;
      margin-bottom: 11px;
    }
    .trip-tag {
      font-size: 11px;
      font-weight: 600;
      color: var(--tag-text);
      background: var(--tag-bg);
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .price-sym {
      font-size: 15px;
      font-weight: 700;
      color: var(--price);
    }
    .price-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--price);
      letter-spacing: -1.5px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .price-note {
      font-size: 11px;
      color: var(--muted);
      margin-left: -2px;
    }

    /* Footer row */
    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .update-time { font-size: 11px; color: #A89C94; }
    .book-btn {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* ── Lightbox ───────────────────────────────────────────── */
    #lb {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(28,23,20,.92);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      backdrop-filter: blur(4px);
    }
    #lb.on { display: flex; }
    #lb img {
      max-width: min(92vw, 540px);
      max-height: 88vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      cursor: default;
    }
    #lb-close {
      position: absolute; top: 20px; right: 22px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(250,247,244,.12);
      color: #FAF7F4;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    #lb-close:hover { background: rgba(250,247,244,.22); }

    /* ── States ─────────────────────────────────────────────── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 44px; margin-bottom: 16px; opacity: .5; }
    .empty p { font-size: 14px; line-height: 2; }
    .loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 64px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── New card animation ──────────────────────────────────── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card.is-new {
      animation: cardIn .45s ease forwards;
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Floating pill ───────────────────────────────────────── */
    #newPill {
      display: none;
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: var(--hdr);
      color: #FAF7F4;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 13px; font-weight: 600;
      z-index: 500;
      box-shadow: 0 4px 20px rgba(28,23,20,.3);
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid rgba(250,247,244,.12);
      animation: pillIn .35s cubic-bezier(.34,1.4,.64,1);
    }
    #newPill.on { display: block; }
    @keyframes pillIn {
      from { opacity:0; transform:translateX(-50%) translateY(-12px) scale(.92); }
      to   { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
    }

    /* ── Update toast ────────────────────────────────────────── */
    #updateToast {
      position: fixed;
      bottom: 64px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--hdr);
      color: #FAF7F4;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
    }
    #updateToast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 9px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Push modal ──────────────────────────────────────────── */
    #onesignal-slidedown-container,
    .onesignal-slidedown-container,
    #onesignal-bell-container,
    .onesignal-bell-container-bottom-right { display: none !important; }

    #pushModal {
      display: none;
      position: fixed; inset: 0; z-index: 10000;
      align-items: center; justify-content: center;
      background: rgba(28,23,20,.6);
      backdrop-filter: blur(6px);
    }
    #pushModal.on { display: flex; }
    .push-card {
      background: var(--card);
      border-radius: 20px;
      padding: 32px 24px 24px;
      max-width: 300px; width: 88%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(28,23,20,.3);
      border: 1px solid var(--border);
      animation: slideUp .22s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .push-icon  { font-size: 44px; margin-bottom: 14px; }
    .push-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .push-desc  { font-size: 13px; color: var(--muted); line-height: 1.75; margin-bottom: 22px; }
    .push-card button {
      display: block; width: 100%;
      padding: 13px;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity .15s;
    }
    .push-card button:active { opacity: .8; }
    #pushYes { background: var(--accent); color: #fff; margin-bottom: 10px; }
    #pushNo  { background: var(--bg); color: var(--muted); font-size: 13px; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; padding: 8px 12px 80px; gap: 12px; }
      .city { font-size: 19px; }
      .price-num { font-size: 28px; }
      .date-val { font-size: 14px; }
    }
    @media (min-width: 900px) {
      .filter-section { flex-direction: row; align-items: flex-start; gap: 16px; padding: 20px 20px 4px; }
      .filter-row + .filter-row { padding-left: 16px; border-left: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<!-- Push modal -->
<div id="pushModal">
  <div class="push-card">
    <div class="push-icon">✈️</div>
    <div class="push-title">订阅低价机票通知</div>
    <div class="push-desc">发现新低价时，第一时间推送通知<br>再也不错过好价格</div>
    <button id="pushYes" onclick="acceptPush()">🔔 立即订阅</button>
    <button id="pushNo"  onclick="dismissPush()">暂不订阅</button>
  </div>
</div>

<!-- New flights pill -->
<div id="newPill" onclick="dismissPill()">
  ✦ <span id="pillCount"></span> 条新低价机票 &nbsp;✕
</div>

<!-- Update toast -->
<div id="updateToast"></div>

<!-- Lightbox -->
<div id="lb" onclick="closeLb()">
  <div id="lb-close" onclick="closeLb()">✕</div>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<header>
  <div class="hdr-eyebrow">人工精选 · 每日更新</div>
  <h1>省着<span>飞</span> ✈</h1>
  <p>发现真正低价的国际机票，点击直达预订</p>
  <div class="hdr-edge"></div>
</header>

<div class="filter-section" id="filterSection">
  <div class="filter-row">
    <span class="filter-label">出发</span>
    <div class="filter-pills" id="fromBar">
      <button class="fpill on" data-from="all" onclick="setFrom('all')">全部</button>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">到达</span>
    <div class="filter-pills" id="toBar">
      <button class="fpill on" data-to="all" onclick="setTo('all')">全部</button>
    </div>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="grid" id="grid">
  <div class="loading">加载中…</div>
</div>

<footer>省着飞 · 价格来自人工甄选，以各平台实时价格为准</footer>

<script>
  let all = [];
  let fromFilter = 'all';
  let toFilter   = 'all';
  const LAST_VISIT_KEY = 'szf_last_visit';

  /* ── Load ── */
  async function load() {
    if (location.protocol === 'file:') {
      grid().innerHTML = `<div class="empty"><div class="icon">🖥️</div><p>请通过网址访问，不能直接双击打开</p></div>`;
      return;
    }
    try {
      const r = await fetch('./flights.json?t=' + Date.now(), {cache:'no-store'});
      if (!r.ok) throw new Error('HTTP ' + r.status);
      all = await r.json();
      all.sort((a, b) => new Date(b.uploadTime) - new Date(a.uploadTime));
      checkNew();
      buildFilters();
      applyFilters();
      setTimeout(() => localStorage.setItem(LAST_VISIT_KEY, new Date().toISOString()), 1000);
      startPolling();
    } catch(e) {
      grid().innerHTML = `<div class="empty"><div class="icon">😕</div><p>数据加载失败（${e.message}）<br>请刷新重试</p></div>`;
    }
  }

  /* ── New flights check ── */
  function checkNew() {
    const last = localStorage.getItem(LAST_VISIT_KEY);
    if (!last) return;
    const newItems = all.filter(f => new Date(f.uploadTime) > new Date(last));
    if (!newItems.length) return;
    window._newIds = new Set(newItems.map(f => f.id));
    const pill = document.getElementById('newPill');
    document.getElementById('pillCount').textContent = newItems.length;
    pill.classList.add('on');
    setTimeout(() => pill.classList.remove('on'), 6000);
  }
  function dismissPill() { document.getElementById('newPill').classList.remove('on'); }

  function showUpdateToast(count) {
    const el = document.getElementById('updateToast');
    el.textContent = `✦ 已自动更新 ${count} 条新低价机票`;
    el.classList.add('on');
    setTimeout(() => el.classList.remove('on'), 4000);
  }

  /* ── Filters ── */
  function buildFilters() {
    const fromBar = document.getElementById('fromBar');
    const toBar   = document.getElementById('toBar');
    fromBar.querySelectorAll('.fpill:not([data-from="all"])').forEach(b => b.remove());
    toBar.querySelectorAll('.fpill:not([data-to="all"])').forEach(b => b.remove());

    [...new Set(all.map(f => f.from))].forEach(city => {
      const b = document.createElement('button');
      b.className = 'fpill' + (city === fromFilter ? ' on' : '');
      b.dataset.from = city;
      b.textContent = city;
      b.onclick = () => setFrom(city);
      fromBar.appendChild(b);
    });
    [...new Set(all.map(f => f.to))].forEach(city => {
      const b = document.createElement('button');
      b.className = 'fpill' + (city === toFilter ? ' on' : '');
      b.dataset.to = city;
      b.textContent = city;
      b.onclick = () => setTo(city);
      toBar.appendChild(b);
    });
  }

  function setFrom(v) {
    fromFilter = v;
    document.querySelectorAll('#fromBar .fpill').forEach(b =>
      b.classList.toggle('on', b.dataset.from === v));
    applyFilters();
  }
  function setTo(v) {
    toFilter = v;
    document.querySelectorAll('#toBar .fpill').forEach(b =>
      b.classList.toggle('on', b.dataset.to === v));
    applyFilters();
  }
  function applyFilters() {
    let list = all;
    if (fromFilter !== 'all') list = list.filter(f => f.from === fromFilter);
    if (toFilter   !== 'all') list = list.filter(f => f.to   === toFilter);
    render(list);
  }

  /* ── Polling ── */
  function startPolling() {
    setInterval(async () => {
      try {
        const r = await fetch('./flights.json?t=' + Date.now(), {cache:'no-store'});
        if (!r.ok) return;
        const fresh = await r.json();
        fresh.sort((a, b) => new Date(b.uploadTime) - new Date(a.uploadTime));
        const oldIds = new Set(all.map(f => f.id));
        const added  = fresh.filter(f => !oldIds.has(f.id));
        if (!added.length) return;
        all = fresh;
        window._newIds = new Set([...(window._newIds || new Set()), ...added.map(f => f.id)]);
        buildFilters();
        applyFilters();
        showUpdateToast(added.length);
        localStorage.setItem(LAST_VISIT_KEY, new Date().toISOString());
      } catch(e) {}
    }, 60000);
  }

  /* ── Render ── */
  function fmtDate(d) { return d ? d.slice(5).replace('-', '/') : ''; }
  function relTime(ts) {
    const h = Math.floor((Date.now() - new Date(ts)) / 3600000);
    if (h < 1)  return '刚刚更新';
    if (h < 24) return `${h}小时前`;
    const d = Math.floor(h / 24);
    return d < 7 ? `${d}天前` : new Date(ts).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
  }
  function e(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render(list) {
    document.getElementById('stats').innerHTML =
      `共 <strong>${list.length}</strong> 条低价线路`;
    if (!list.length) {
      grid().innerHTML = '<div class="empty"><div class="icon">🔍</div><p>暂无符合条件的低价机票</p></div>';
      return;
    }

    grid().innerHTML = list.map(f => {
      const isNew  = window._newIds?.has(f.id);
      const dep    = fmtDate(f.departDate);
      const ret    = fmtDate(f.returnDate);
      const isRT   = f.tripType === '往返' && ret;

      const datesHtml = dep ? `
        <div class="dates-row">
          <div class="date-block">
            <span class="date-label">去程</span>
            <span class="date-val">${dep}</span>
          </div>
          ${isRT ? `
          <span class="date-sep">→</span>
          <div class="date-block">
            <span class="date-label">返程</span>
            <span class="date-val">${ret}</span>
          </div>` : ''}
        </div>` : '';

      const imgHtml = f.image
        ? `<img class="card-img" src="${e(f.image)}" alt="${e(f.from)}→${e(f.to)}" loading="lazy"
             onclick="event.preventDefault();event.stopPropagation();openLb(this.src)"
             onerror="this.parentElement.innerHTML='<div class=card-img-ph>✈️</div>'">`
        : `<div class="card-img-ph">✈️</div>`;

      return `<a class="card${isNew ? ' is-new' : ''}" href="${e(f.ctripUrl||'#')}" target="_blank" rel="noopener">
        <div class="card-img-wrap">
          ${isNew ? '<span class="new-badge">NEW</span>' : ''}
          ${imgHtml}
        </div>
        <div class="card-info">
          <div class="route-row">
            <span class="city">${e(f.from)}</span>
            <div class="route-arrow">
              <svg viewBox="0 0 32 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 7h28M22 2l8 5-8 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 4l-2 1 6 2-6 2 2 1" fill="currentColor" opacity=".4"/>
              </svg>
            </div>
            <span class="city dest">${e(f.to)}</span>
          </div>
          ${datesHtml}
          <div class="price-row">
            <span class="trip-tag">${e(f.tripType||'往返')}</span>
            <span class="price-sym">¥</span>
            <span class="price-num">${f.price}</span>
            <span class="price-note">含税/人</span>
          </div>
          <div class="card-foot">
            <span class="update-time">${relTime(f.uploadTime)}</span>
            <span class="book-btn">立即预订 →</span>
          </div>
        </div>
      </a>`;
    }).join('');
  }

  function grid() { return document.getElementById('grid'); }

  /* ── Lightbox ── */
  function openLb(src) {
    document.getElementById('lb-img').src = src;
    document.getElementById('lb').classList.add('on');
    document.body.style.overflow = 'hidden';
  }
  function closeLb() {
    document.getElementById('lb').classList.remove('on');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', ev => { if(ev.key==='Escape') closeLb(); });

  load();
</script>
